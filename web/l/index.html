<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#4859d9" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
        <title>Shared list · Trackd</title>
        <meta name="description" content="A shared vinyl record list on Trackd." />

        <link rel="stylesheet" href="/styles.css" />
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234859d9'%3E%3Cpath d='M12 2a10 10 0 100 20 10 10 0 000-20zm0 14a4 4 0 110-8 4 4 0 010 8zm0-2.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z'/%3E%3C/svg%3E" />
    </head>
    <body>
        <div class="container">
            <header class="brand">
                <a href="/" style="display:flex;align-items:center;gap:12px;color:inherit;text-decoration:none;">
                    <span class="logo" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 14a4 4 0 110-8 4 4 0 010 8zm0-2.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" />
                        </svg>
                    </span>
                    <span class="wordmark">Trackd</span>
                </a>
            </header>

            <main id="main">
                <div class="state" id="loading">
                    <div class="spinner" aria-hidden="true"></div>
                    <p style="margin-top:16px;">Loading list…</p>
                </div>
            </main>
        </div>

        <footer>
            Want this in your pocket? <a href="/">Get Trackd</a>
        </footer>

        <script src="/js/config.js"></script>
        <script type="module" src="/js/list.js"></script>
    </body>
</html>
