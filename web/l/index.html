<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#171b2a" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="#171b2a" media="(prefers-color-scheme: dark)" />
        <title>Shared list · Deadwax Club</title>
        <meta name="description" content="A shared vinyl record list on Deadwax Club." />

        <link rel="stylesheet" href="/styles.css" />
        <link rel="icon" href="/assets/deadwax-logo.svg" type="image/svg+xml" />
    </head>
    <body>
        <header class="site-header">
            <a class="brand-link" href="/" aria-label="Deadwax Club home">
                <span class="logo" aria-hidden="true">
                    <img src="/assets/deadwax-logo.svg" alt="" />
                </span>
                <span class="wordmark">Deadwax Club</span>
            </a>
            <a class="header-link" href="/">Get the app</a>
        </header>

        <div class="container list-container">
            <main id="main">
                <div class="state" id="loading">
                    <div class="spinner" aria-hidden="true"></div>
                    <p>Loading list...</p>
                </div>
            </main>
        </div>

        <footer>
            Want this in your pocket? <a href="/">Get Deadwax Club</a>
        </footer>

        <script src="/js/config.js"></script>
        <script type="module" src="/js/list.js"></script>
    </body>
</html>
