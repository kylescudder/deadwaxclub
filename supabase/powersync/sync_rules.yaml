# PowerSync sync rules for DeadWaxClub.
# Apply via the PowerSync dashboard's Sync Streams editor.
#
# Uses edition 3 (the current stable "Sync Streams" model). Notes:
#   - One `query:` per stream (no separate parameters/data sections).
#   - `auth.user_id()` instead of `request.user_id()`.
#   - Single-level subqueries (`where x in (select … from t where …)`) are
#     allowed; nested subqueries are NOT.
#   - `auto_subscribe: true` keeps the stream syncing without the client
#     calling SyncStream.subscribe explicitly.

config:
  edition: 3

streams:
  # --- profile / device --------------------------------------------------
  user_profile:
    auto_subscribe: true
    query: select * from profiles where id = auth.user_id()

  user_devices:
    auto_subscribe: true
    query: select * from device_tokens where user_id = auth.user_id()

  user_notifications:
    auto_subscribe: true
    query: select * from notifications where user_id = auth.user_id()

  user_iap_entitlement:
    auto_subscribe: true
    query: |
      select user_id as id, product_id, original_transaction_id, status, expires_at, revoked_at, environment, updated_at
      from iap_entitlements
      where user_id = auth.user_id()

  # --- collections (replaces single-owner user_records / user_prices) ----
  # A user belongs to one or more collections via collection_members. The
  # Records tab shows the union; an attribution chip surfaces which
  # collection a record came from once the user is in more than one.
  member_collections:
    auto_subscribe: true
    query: |
      select * from collections
      where id in (select collection_id from collection_members where user_id = auth.user_id())

  # collection_members has a composite PK (collection_id, user_id) — synthesise
  # an `id` column so PowerSync can key rows locally.
  member_collection_members:
    auto_subscribe: true
    query: |
      select collection_id || ':' || user_id as id, collection_id, user_id, role, invited_by, joined_at
      from collection_members
      where collection_id in (select collection_id from collection_members where user_id = auth.user_id())

  member_collection_pending_invites:
    auto_subscribe: true
    query: |
      select * from collection_pending_invites
      where collection_id in (select collection_id from collection_members where user_id = auth.user_id())

  member_records:
    auto_subscribe: true
    query: |
      select * from records
      where collection_id in (select collection_id from collection_members where user_id = auth.user_id())

  # Canonical catalog facts are not user-specific. Syncing the catalog avoids
  # edition-3 nested subqueries while keeping collection ownership on `records`.
  albums:
    auto_subscribe: true
    query: select * from albums

  record_pressings:
    auto_subscribe: true
    query: select * from record_pressings

  member_prices:
    auto_subscribe: true
    query: |
      select * from price_entries
      where collection_id in (select collection_id from collection_members where user_id = auth.user_id())

  member_record_images:
    auto_subscribe: true
    query: |
      select * from record_images
      where collection_id in (select collection_id from collection_members where user_id = auth.user_id())

  # --- lists (curated subsets — separate from collections) --------------
  user_lists:
    auto_subscribe: true
    query: select * from lists where owner_id = auth.user_id()

  owned_list_items:
    auto_subscribe: true
    query: |
      select * from list_items
      where list_id in (select id from lists where owner_id = auth.user_id())

  owned_list_members:
    auto_subscribe: true
    query: |
      select list_id || ':' || user_id as id, list_id, user_id, role, invited_by, joined_at
      from list_members
      where list_id in (select id from lists where owner_id = auth.user_id())

  owned_pending_invites:
    auto_subscribe: true
    query: |
      select * from pending_invites
      where list_id in (select id from lists where owner_id = auth.user_id())

  member_lists:
    auto_subscribe: true
    query: |
      select * from lists
      where id in (select list_id from list_members where user_id = auth.user_id())

  member_list_items:
    auto_subscribe: true
    query: |
      select * from list_items
      where list_id in (select list_id from list_members where user_id = auth.user_id())

  member_list_members:
    auto_subscribe: true
    query: |
      select list_id || ':' || user_id as id, list_id, user_id, role, invited_by, joined_at
      from list_members
      where list_id in (select list_id from list_members where user_id = auth.user_id())

  member_pending_invites:
    auto_subscribe: true
    query: |
      select * from pending_invites
      where list_id in (select list_id from list_members where user_id = auth.user_id())

  # NOTE: records on lists the user is a member of (but doesn't own) still
  # cannot be expressed here under edition 3 — that requires a 2-level join
  # (list_members → list_items → records). Records that the user *owns* now
  # always sync via member_records (1-level join through collection_members).
  # The remaining gap is curated public/collaborative lists pulling in records
  # that aren't in the viewer's collections — those still fetch via REST.
