name: DeadWaxClub
options:
  bundleIdPrefix: com.deadwaxclub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set in Xcode after first generate
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
  PowerSync:
    url: https://github.com/powersync-ja/powersync-swift
    from: 1.0.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: 4.5.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0

schemes:
  DeadWaxClub:
    build:
      targets:
        DeadWaxClub: all
    run:
      config: Debug
      executable: DeadWaxClub
      storeKitConfiguration: DeadWaxClub/Resources/StoreKit/DeadWaxClub.storekit

targets:
  DeadWaxClub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeadWaxClub
        excludes:
          - "Generated/Secrets.swift"
    resources:
      - path: DeadWaxClub/Resources
        optional: true
    info:
      path: DeadWaxClub/Info.plist
      properties:
        CFBundleDisplayName: Deadwax Club
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Deadwax Club uses the camera to scan vinyl barcodes and take photos you choose to add to your records.
        NSPhotoLibraryAddUsageDescription: Deadwax Club saves cover art for your records.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - deadwaxclub
            CFBundleURLName: com.deadwaxclub.auth
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Roboto-Medium.ttf
        UIBackgroundModes:
          - remote-notification
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        POWERSYNC_URL: $(POWERSYNC_URL)
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadwaxclub.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: DWC
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: DeadWaxClub/DeadWaxClub.entitlements
      configs:
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: DeadwaxClub App Store
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: PowerSync
        product: PowerSync
      - package: Lottie
        product: Lottie
      - package: Sentry
        product: Sentry
      - target: DeadWaxClubWidgets
        embed: true

  DeadWaxClubWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeadWaxClubWidgets
      - path: DeadWaxClub/Widgets/WidgetSnapshotStore.swift
    info:
      path: DeadWaxClubWidgets/Info.plist
      properties:
        CFBundleDisplayName: Deadwax Club Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadwaxclub.app.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: DeadWaxClubWidgets/DeadWaxClubWidgets.entitlements
        SKIP_INSTALL: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: DeadwaxClub Widgets App Store
