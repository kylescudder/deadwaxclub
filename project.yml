name: DeadWaxClub
options:
  bundleIdPrefix: com.deadwaxclub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set in Xcode after first generate
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0
  PowerSync:
    url: https://github.com/powersync-ja/powersync-swift
    from: 1.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.40.0

targets:
  DeadWaxClub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeadWaxClub
        excludes:
          - "Generated/Secrets.swift"
    resources:
      - path: DeadWaxClub/Resources
        optional: true
    info:
      path: DeadWaxClub/Info.plist
      properties:
        CFBundleDisplayName: Deadwax Club
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Deadwax Club uses the camera to scan vinyl barcodes and to photograph your records for the cover-art carousel.
        NSPhotoLibraryAddUsageDescription: Deadwax Club saves cover art for your records.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - deadwaxclub
            CFBundleURLName: com.deadwaxclub.auth
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Roboto-Medium.ttf
        UIBackgroundModes:
          - remote-notification
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        POWERSYNC_URL: $(POWERSYNC_URL)
        SENTRY_DSN: $(SENTRY_DSN)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadwaxclub.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: DeadWaxClub/DeadWaxClub.entitlements
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
      - package: PowerSync
        product: PowerSync
      - package: Sentry
        product: Sentry
